server:
  port: ${PORT:8089}

spring:
  application:
    name: procurement-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/autocare_procurement}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}