# ConfiguraciÃ³n del servidor
server:
  port: ${PORT:8085} # Puerto del servidor (por defecto 8085)
  forward-headers-strategy: framework # Estrategia para headers reenviados

# ConfiguraciÃ³n de Spring
spring:
  application:
    name: booking-service # Nombre de la aplicaciÃ³n
  # ConfiguraciÃ³n de base de datos
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/autocare_booking} # URL de conexiÃ³n PostgreSQL
    username: ${DB_USER:postgres} # Usuario de BD (por defecto postgres)
    password: ${DB_PASSWORD:admin} # ContraseÃ±a de BD (por defecto admin)
    hikari:
      maximum-pool-size: 3
  # ConfiguraciÃ³n de JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update # Auto-actualizar el esquema de BD
    show-sql: true # Mostrar queries SQL en logs
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect # Dialecto para PostgreSQL
  # ConfiguraciÃ³n de Cloud
  cloud:
    compatibility-verifier:
      enabled: false # Verificador de compatibilidad deshabilitado
  # ConfiguraciÃ³n de MVC
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher # Estrategia de matching de rutas

# ConfiguraciÃ³n de Eureka (Service Discovery)
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka} # URL del servidor Eureka

# ConfiguraciÃ³n de SpringDoc (OpenAPI/Swagger)
springdoc:
  api-docs:
    enabled: true # Habilitar documentaciÃ³n API
  swagger-ui:
    enabled: true # Habilitar interfaz Swagger UI
    path: /doc/swagger-ui.html # Ruta de acceso a Swagger UI
  hateoasRestHandlerMappingEnabled: false # HATEOAS deshabilitado
