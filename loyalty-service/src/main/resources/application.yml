server:
  port: ${PORT:8088}

spring:
  application:
    name: loyalty-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/autocare_loyalty}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}