spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # 👤 Dominio del Cliente y Atención
        - id: garage-service
          uri: lb://garage-service
          predicates:
            - Path=/api/garage/**

        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/reservas/**

        - id: loyalty-service
          uri: lb://loyalty-service
          predicates:
            - Path=/api/lealtad/**

        # 🛠️ Dominio del Taller y Operaciones
        - id: workshop-service
          uri: lb://workshop-service
          predicates:
            - Path=/api/taller/**

        - id: diagnostics-service
          uri: lb://diagnostics-service
          predicates:
            - Path=/api/diagnosticos/**

        - id: hr-service
          uri: lb://hr-service
          predicates:
            - Path=/api/personal/**

        # 📦 Dominio de Suministros
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventario/**

        - id: procurement-service
          uri: lb://procurement-service
          predicates:
            - Path=/api/compras/**

        # 💰 Dominio Financiero y Transversal
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/api/facturacion/**

        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/metricas/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notificaciones/**

server:
  port: ${PORT:8080}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html
