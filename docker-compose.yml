version: '3.8'

services:
  # ==========================================
  # SERVIDORES INFRAESTRUCTURA DE SPRING CLOUD
  # ==========================================

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - autocare-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/"]
      interval: 10s
      timeout: 5s
      retries: 3

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks:
      - autocare-net
    depends_on:
      eureka-server:
        condition: service_healthy

  # ==========================================
  # MICROSERVICIOS FUNCIONALES Y SUS BASES DE DATOS
  # ==========================================
  
  # 👤 DOMINIO CLIENTE: Garage Service
  db-garage:
    image: postgres:15-alpine
    container_name: db-garage
    environment:
      POSTGRES_DB: autocare_garage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    networks:
      - autocare-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autocare_garage"]
      interval: 5s
      timeout: 5s
      retries: 5

  garage-service:
    build: ./garage-service
    container_name: garage-service
    environment:
      - DB_URL=jdbc:postgresql://db-garage:5432/autocare_garage
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks:
      - autocare-net
    depends_on:
      eureka-server:
        condition: service_healthy
      db-garage:
        condition: service_healthy

  # 📦 DOMINIO SUMINISTROS: Inventory Service
  db-inventory:
    image: postgres:15-alpine
    container_name: db-inventory
    environment:
      POSTGRES_DB: autocare_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    networks:
      - autocare-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autocare_inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    environment:
      - DB_URL=jdbc:postgresql://db-inventory:5432/autocare_inventory
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks:
      - autocare-net
    depends_on:
      eureka-server:
        condition: service_healthy
      db-inventory:
        condition: service_healthy

  # 📅 DOMINIO AGENDAMIENTO: Booking Service
  booking-service:
    build: ./booking-service
    container_name: booking-service
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks:
      - autocare-net
    depends_on:
      eureka-server:
        condition: service_healthy

  # 🛠️ DOMINIO OPERACIONES: Workshop Service
  workshop-service:
    build: ./workshop-service
    container_name: workshop-service
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks:
      - autocare-net
    depends_on:
      eureka-server:
        condition: service_healthy

  # 🧾 DOMINIO FINANZAS: Billing Service
  billing-service:
    build: ./billing-service
    container_name: billing-service
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks:
      - autocare-net
    depends_on:
      eureka-server:
        condition: service_healthy

  # 🔔 DOMINIO ALERTAS: Notification Service
  notification-service:
    build: ./notification-service
    container_name: notification-service
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks:
      - autocare-net
    depends_on:
      eureka-server:
        condition: service_healthy

  # 📊 DOMINIO ANALÍTICA: Analytics Service
  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks:
      - autocare-net
    depends_on:
      eureka-server:
        condition: service_healthy

  # 🩺 DOMINIO DIAGNÓSTICO: Diagnostics Service
  diagnostics-service:
    build: ./diagnostics-service
    container_name: diagnostics-service
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks:
      - autocare-net
    depends_on:
      eureka-server:
        condition: service_healthy

  # 👥 DOMINIO RECURSOS HUMANOS: HR Service
  hr-service:
    build: ./hr-service
    container_name: hr-service
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks:
      - autocare-net
    depends_on:
      eureka-server:
        condition: service_healthy

  # 🎁 DOMINIO FIDELIZACIÓN: Loyalty Service
  loyalty-service:
    build: ./loyalty-service
    container_name: loyalty-service
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks:
      - autocare-net
    depends_on:
      eureka-server:
        condition: service_healthy

  # 🛒 DOMINIO ADQUISICIONES: Procurement Service
  procurement-service:
    build: ./procurement-service
    container_name: procurement-service
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks:
      - autocare-net
    depends_on:
      eureka-server:
        condition: service_healthy

networks:
  autocare-net:
    driver: bridge