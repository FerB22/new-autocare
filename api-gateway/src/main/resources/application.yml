spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # 👤 Dominio del Cliente y Atención
        - id: garage-service
          uri: lb://garage-service
          predicates:
            - Path=/api/garage/**
          filters:
            - StripPrefix=1

        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/reservas/**
          filters:
            - StripPrefix=1

        - id: loyalty-service
          uri: lb://loyalty-service
          predicates:
            - Path=/api/lealtad/**
          filters:
            - StripPrefix=1

        # 🛠️ Dominio del Taller y Operaciones
        - id: workshop-service
          uri: lb://workshop-service
          predicates:
            - Path=/api/taller/**
          filters:
            - StripPrefix=1

        - id: diagnostics-service
          uri: lb://diagnostics-service
          predicates:
            - Path=/api/diagnosticos/**
          filters:
            - StripPrefix=1

        - id: hr-service
          uri: lb://hr-service
          predicates:
            - Path=/api/personal/**
          filters:
            - StripPrefix=1

        # 📦 Dominio de Suministros
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventario/**
          filters:
            - StripPrefix=1

        - id: procurement-service
          uri: lb://procurement-service
          predicates:
            - Path=/api/compras/**
          filters:
            - StripPrefix=1

        # 💰 Dominio Financiero y Transversal
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/api/facturacion/**
          filters:
            - StripPrefix=1

        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/reportes/**
          filters:
            - StripPrefix=1

server:
  port: ${PORT:8080}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html