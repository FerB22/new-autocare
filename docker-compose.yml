    container_name: inventory-service
    environment:
      - DB_URL=jdbc:postgresql://db-inventory:5432/autocare_inventory
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks:
      - autocare-net
    depends_on:
      eureka-server:
        condition: service_healthy
      db-inventory:
        condition: service_healthy

  # 📅 DOMINIO AGENDAMIENTO: Booking Service
  db-booking:
